object:
  id: OBJ-006
  code: PROJECT
  name: Project
  plural: Projects
  version: 1.0.0
  status: Draft

ownership:
  business_owner: Project Management Office (PMO)
  technical_owner: Swissbay Architecture
  governance_owner: Nexus Governance Board

classification:
  object_type: Master Business Object
  domain: Project & Portfolio Management
  criticality: Critical
  confidentiality: Internal
  lifecycle: Active

description:
  summary: >
    Represents every governed project executed within
    Swissbay Nexus, providing the canonical model for
    planning, execution, monitoring and delivery.

  purpose: >
    Establish a single enterprise representation of
    projects that standardises governance, planning,
    resources, budgets, schedules, risks, deliverables
    and project outcomes.

